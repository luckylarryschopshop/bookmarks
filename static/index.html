<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Manager</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      background-color: #0d1117;
      color: #e6edf3;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    input, button {
      padding: 8px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
    }
    input {
      flex: 1;
      background-color: #1a1f26;
      color: #e6edf3;
    }
    button {
      background-color: #f97316;
      color: #0d1117;
      cursor: pointer;
    }
    button:hover {
      background-color: #ea580d;
    }
    .tag {
      display: inline-block;
      background-color: #1a1f26;
      padding: 4px 8px;
      border-radius: 4px;
      margin: 2px;
      font-size: 12px;
    }
    .bookmark {
      background-color: #1a1f26;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .bookmark-title {
      font-weight: bold;
    }
    .bookmark-actions {
      display: flex;
      gap: 5px;
    }
    .bookmark-actions button {
      background-color: transparent;
      color: #f97316;
      border: none;
      cursor: pointer;
    }
    .bookmark-actions button:hover {
      text-decoration: underline;
    }
    .empty {
      text-align: center;
      color: #6c757d;
      margin-top: 20px;
    }
    .search {
      margin-bottom: 10px;
    }
    .search input {
      width: 100%;
      max-width: 300px;
    }
    .tag-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }
    .tag-filter button {
      background-color: #1a1f26;
      color: #e6edf3;
      border: 1px solid #f97316;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    .tag-filter button.active {
      background-color: #f97316;
      color: #0d1117;
    }
  </style>
</head>
<body>
  <h1>Bookmark Manager</h1>
  <form id="addForm">
    <input type="text" id="url" placeholder="URL" required />
    <input type="text" id="title" placeholder="Title" required />
    <input type="text" id="tags" placeholder="Tags (comma separated)" />
    <button type="submit">Add</button>
  </form>
  <div class="search">
    <input type="text" id="searchInput" placeholder="Search bookmarks..." />
  </div>
  <div class="tag-filter" id="tagFilter"></div>
  <div id="bookmarks"></div>
  <div class="empty" id="emptyState">No bookmarks found.</div>

  <script>
    const api = '/api/bookmarks';
    const bookmarksDiv = document.getElementById('bookmarks');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const tagFilter = document.getElementById('tagFilter');
    const addForm = document.getElementById('addForm');

    async function fetchBookmarks(query = '') {
      const url = query ? `${api}?q=${encodeURIComponent(query)}` : api;
      const res = await fetch(url);
      const data = await res.json();
      renderBookmarks(data);
    }

    function renderBookmarks(bookmarks) {
      bookmarksDiv.innerHTML = '';
      emptyState.style.display = bookmarks.length ? 'none' : 'block';

      const tags = new Set();
      bookmarks.forEach(b => b.tags.forEach(t => tags.add(t)));

      tagFilter.innerHTML = '';
      Array.from(tags).forEach(tag => {
        const btn = document.createElement('button');
        btn.textContent = tag;
        btn.onclick = () => fetchBookmarks(tag);
        tagFilter.appendChild(btn);
      });

      bookmarks.forEach(bookmark => {
        const div = document.createElement('div');
        div.className = 'bookmark';
        div.innerHTML = `
          <div>
            <div class="bookmark-title">${bookmark.title}</div>
            <div class="tags">${bookmark.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          </div>
          <div class="bookmark-actions">
            <button onclick="editBookmark(${bookmark.id})">Edit</button>
            <button onclick="deleteBookmark(${bookmark.id})">Delete</button>
          </div>
        `;
        bookmarksDiv.appendChild(div);
      });
    }

    async function addBookmark() {
      const url = document.getElementById('url').value;
      const title = document.getElementById('title').value;
      const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t);
      const res = await fetch(api, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, title, tags })
      });
      if (res.ok) await fetchBookmarks();
    }

    async function editBookmark(id) {
      const res = await fetch(`${api}/${id}`);
      const bookmark = await res.json();
      document.getElementById('url').value = bookmark.url;
      document.getElementById('title').value = bookmark.title;
      document.getElementById('tags').value = bookmark.tags.join(', ');
      addForm.onsubmit = async (e) => {
        e.preventDefault();
        const url = document.getElementById('url').value;
        const title = document.getElementById('title').value;
        const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t);
        const res = await fetch(`${api}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, title, tags })
        });
        if (res.ok) await fetchBookmarks();
      };
    }

    async function deleteBookmark(id) {
      if (confirm('Are you sure?')) {
        await fetch(`${api}/${id}`, { method: 'DELETE' });
        await fetchBookmarks();
      }
    }

    addForm.addEventListener('submit', (e) => {
      e.preventDefault();
      addBookmark();
    });

    searchInput.addEventListener('input', (e) => fetchBookmarks(e.target.value));

    fetchBookmarks();
  </script>
</body>
</html>
